<!DOCTYPE html>
<html>
<head>
    <title>AR Segitiga Pink</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.1/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Menggunakan Hiro Marker -->
        <a-marker preset="hiro">
            
            <!-- Menggunakan objek segitiga FLAT 2D berwarna Pink -->
            <!-- rotation="-90 0 0" membuat segitiga berdiri tegak di atas marker -->
            <a-triangle position="0 0.5 0" 
                        rotation="-90 0 0"
                        scale="1.2 1.2 1.2"
                        material="color: #ff69b4; side: double; opacity: 0.9;"
                        animation="property: rotation; to: -90 360 0; loop: true; dur: 5000">
            </a-triangle>
            
        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
