<!DOCTYPE html>
<html>
<head>
    <title>AR Sofia the First</title>
    <!-- Menggunakan kombinasi versi yang sangat stabil untuk AR.js WebAR -->
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.1/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- Menambahkan arjs-loader untuk memastikan library siap -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <!-- Pastikan file sofia.glb berada di folder yang sama dengan index.html di GitHub -->
            <a-asset-item id="sofia-model" src="sofia.glb"></a-asset-item>
        </a-assets>

        <!-- Menggunakan Hiro Marker -->
        <a-marker preset="hiro">
            
            <!-- Jika nanti model Sofia tidak muncul, coba tes ganti ke <a-box> dulu 
                 untuk memastikan apakah kameranya sudah jalan atau belum -->
            <a-entity gltf-model="#sofia-model"
                      position="0 0 0" 
                      scale="0.2 0.2 0.2"
                      rotation="0 0 0"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
            </a-entity>
            
        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
